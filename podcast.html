<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #111111;
      padding: 40px 25px;
      margin: 0 auto;
      max-width: 600px;
      line-height: 1.6;
    }
    @media (prefers-color-scheme: dark) {
      body { background-color: #111111; color: #eeeeee; }
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.5px;
      margin-bottom: 40px;
    }
    input {
      width: 100%;
      padding: 12px 0;
      margin-bottom: 20px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #cccccc;
      color: inherit;
      font-size: 16px;
      border-radius: 0;
      outline: none;
      box-sizing: border-box;
    }
    input:focus { border-bottom: 1px solid #111111; }
    @media (prefers-color-scheme: dark) {
      input { border-bottom: 1px solid #444444; }
      input:focus { border-bottom: 1px solid #eeeeee; }
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    button {
      background: transparent;
      border: 1px solid #111111;
      color: #111111;
      padding: 10px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      button { border: 1px solid #eeeeee; color: #eeeeee; }
    }
    button:hover { background: #111111; color: #ffffff; }
    @media (prefers-color-scheme: dark) {
      button:hover { background: #eeeeee; color: #111111; }
    }
    .track-status {
      font-size: 13px;
      color: #666666;
      margin-bottom: 20px;
    }
    audio {
      width: 100%;
      margin: 20px 0 40px 0;
      outline: none;
    }
    h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888888;
      margin-top: 40px;
      border-bottom: 1px solid #eeeeee;
      padding-bottom: 10px;
    }
    @media (prefers-color-scheme: dark) {
      h2 { border-bottom: 1px solid #333333; }
    }
    .item {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #eeeeee;
      font-size: 14px;
    }
    @media (prefers-color-scheme: dark) {
      .item { border-bottom: 1px solid #333333; }
    }
    .item-text { cursor: pointer; flex-grow: 1; }
    .del-btn {
      border: none;
      padding: 0;
      margin: 0;
      color: #888888;
      background: transparent;
    }
    .del-btn:hover { background: transparent; color: #111111; }
    @media (prefers-color-scheme: dark) {
      .del-btn:hover { background: transparent; color: #eeeeee; }
    }
  </style>
</head>
<body>

  <h1>Stream</h1>
  <input type="text" id="youtubeUrl" placeholder="Paste URL here...">
  
  <div class="button-group">
    <button id="btnLoad">Play</button>
    <button id="btnFav">Save</button>
    <button id="btnBookmark">Bookmark</button>
  </div>

  <div id="statusText" class="track-status">Initializing networking...</div>
  
  <audio id="player" controls autoplay playsinline></audio>
  
  <h2>Favorites</h2>
  <div id="favList"></div>

  <h2>Bookmarks</h2>
  <div id="bookmarkList"></div>

  <script>
    const player = document.getElementById('player');
    const btnLoad = document.getElementById('btnLoad');
    const btnFav = document.getElementById('btnFav');
    const btnBookmark = document.getElementById('btnBookmark');
    const statusText = document.getElementById('statusText');
    const youtubeUrlInput = document.getElementById('youtubeUrl');

    let activeVideoId = '';
    let activeTitle = 'No Track Loaded';
    let instanceRegistry = [];

    // 1. DYNAMICALLY FETCH HEALTHY, CORS-ENABLED INSTANCES
    async function fetchInstanceRegistry() {
      try {
        const res = await fetch("https://api.invidious.io/instances.json?sort_by=health");
        const data = await res.json();
        
        instanceRegistry = data
          .filter(i => i[1].type === "https" && i[1].api === true && i[1].cors === true)
          .map(i => i[1].uri);
          
        statusText.innerText = `Ready. Linked to ${instanceRegistry.length} active nodes.`;
      } catch (err) {
        instanceRegistry = ['https://inv.tux.digital', 'https://invidious.nerdvpn.de'];
        statusText.innerText = "Ready. Linked to fallback nodes.";
      }
    }

    // 2. ITERATE THROUGH NODES UNTIL AUDIO EXTRACTS
    async function fetchAudio(url) {
      const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
      const match = url.match(regExp);
      
      if (!match) {
        statusText.innerText = "Invalid URL format.";
        return;
      }
      
      activeVideoId = match[1];
      
      for (const baseApi of instanceRegistry) {
        try {
          statusText.innerText = `Routing via ${baseApi.replace('https://', '')}...`;
          
          const res = await fetch(`${baseApi}/api/v1/videos/${activeVideoId}`);
          if (!res.ok) continue; 
          
          const data = await res.json();
          if (!data.adaptiveFormats) continue; 
          
          const stream = data.adaptiveFormats.find(f => f.type.includes('audio/webm') || f.type.includes('audio/mp4'));
          
          if (stream && stream.url) {
            activeTitle = data.title;
            statusText.innerText = `Playing: ${activeTitle}`;
            player.src = stream.url;
            player.play();
            configureMediaSession();
            return; 
          }
        } catch (err) {
          console.warn(`Node ${baseApi} failed.`);
        }
      }
      
      statusText.innerText = "All active nodes failed to extract audio. Try again later.";
    }

    function configureMediaSession() {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: activeTitle,
          artist: 'Stream',
          artwork: [{ src: `https://img.youtube.com/vi/${activeVideoId}/hqdefault.jpg`, sizes: '480x360', type: 'image/jpeg' }]
        });

        navigator.mediaSession.setActionHandler('play', () => player.play());
        navigator.mediaSession.setActionHandler('pause', () => player.pause());
        navigator.mediaSession.setActionHandler('seekbackward', () => player.currentTime = Math.max(player.currentTime - 10, 0));
        navigator.mediaSession.setActionHandler('seekforward', () => player.currentTime = Math.min(player.currentTime + 10, player.duration));
      }
    }

    function readData(key) { return JSON.parse(localStorage.getItem(key)) || []; }
    function writeData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

    function updateUiLists() {
      const favorites = readData('favorites');
      const bookmarks = readData('bookmarks');

      document.getElementById('favList').innerHTML = favorites.map((item, idx) => `
        <div class="item">
          <span class="item-text" onclick="directPlay('${item.id}')">${item.title}</span>
          <button class="del-btn" onclick="removeItem('favorites', ${idx})">REMOVE</button>
        </div>
      `).join('');

      document.getElementById('bookmarkList').innerHTML = bookmarks.map((item, idx) => `
        <div class="item">
          <span class="item-text" onclick="jumpToBookmark('${item.id}', ${item.time})">${item.title} (${Math.floor(item.time)}s)</span>
          <button class="del-btn" onclick="removeItem('bookmarks', ${idx})">REMOVE</button>
        </div>
      `).join('');
    }

    window.removeItem = function(key, idx) {
      let list = readData(key);
      list.splice(idx, 1);
      writeData(key, list);
      updateUiLists();
    };

    window.directPlay = function(id) {
      youtubeUrlInput.value = `https://www.youtube.com/watch?v=${id}`;
      fetchAudio(youtubeUrlInput.value);
    };

    window.jumpToBookmark = function(id, time) {
      youtubeUrlInput.value = `https://www.youtube.com/watch?v=${id}`;
      fetchAudio(youtubeUrlInput.value);
      player.addEventListener('loadedmetadata', () => {
        player.currentTime = time;
      }, { once: true });
    };

    btnLoad.addEventListener('click', () => fetchAudio(youtubeUrlInput.value));

    btnFav.addEventListener('click', () => {
      if (!activeVideoId) return;
      let favorites = readData('favorites');
      if (!favorites.some(f => f.id === activeVideoId)) {
        favorites.push({ id: activeVideoId, title: activeTitle });
        writeData('favorites', favorites);
        updateUiLists();
      }
    });

    btnBookmark.addEventListener('click', () => {
      if (!activeVideoId) return;
      let bookmarks = readData('bookmarks');
      bookmarks.push({ id: activeVideoId, title: activeTitle, time: player.currentTime });
      writeData('bookmarks', bookmarks);
      updateUiLists();
    });

    fetchInstanceRegistry();
    updateUiLists();
  </script>
</body>
</html>
